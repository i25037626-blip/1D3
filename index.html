<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Anhui</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #f6e7d8;
        }

        .container {
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: space-between;
            padding: 0 6%;
        }

        /* 左边 */
        .left {
            flex: 1;
        }

        .left h1 {
            font-size: 64px;
            color: #333;
        }

        .left p {
            margin-top: 15px;
            font-size: 18px;
            color: #666;
        }

        .desc {
    margin-top: 15px;
    font-size: 18px;
    color: #666;
    line-height: 1.6;
    max-width: 420px;
        }
        .btn {
            margin-top: 30px;
            padding: 14px 32px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #555;
            transform: translateY(-3px);
        }

        /* 右边（重点优化） */
        .right {
            flex: 1.2; /* 比左边更宽 */
            display: flex;
            justify-content: center;
        }

        .right img {
            width: 100%;
            max-width: 650px; /* 图片更大 */
            height: auto;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        }

        /* 手机适配 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                text-align: center;
            }

            .right {
                margin-top: 30px;
            }

            .left h1 {
                font-size: 42px;
            }

            .right img {
                max-width: 90%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        
        <!-- 左边 -->
        <div class="left">
            <h1>Discover Anhui</h1>
            <p class="desc">
    Anhui is a beautiful province in eastern China. 
    It is famous for Mount Huangshan and old villages. 
    It has nice food, traditional operas and a long history.
</p>
            <button class="btn" onclick="goExplore()">Explore more</button>

<script>
function goExplore() {
    window.location.href = "page2.html";
}
</script>

        <!-- 右边 -->
        <div class="right">
            <img src="https://n.sinaimg.cn/sinakd20122/799/w2048h1151/20230216/7611-94efe79a2f177655d7cb88c673311ac6.jpg">
        </div>

    </div>

</body>
</html>
