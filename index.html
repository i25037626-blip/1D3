<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Anhui</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #f6e7d8; /* 奶黄色 */
        }

        .container {
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: space-between;
            padding: 0 8%;
        }

        /* 左边文字 */
        .left {
            flex: 1;
        }

        .left h1 {
            font-size: 60px;
            color: #333;
        }

        .left p {
            margin-top: 15px;
            font-size: 18px;
            color: #666;
        }

        .btn {
            margin-top: 30px;
            padding: 12px 28px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #555;
            transform: translateY(-3px);
        }

        /* 右边图片 */
        .right {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .right img {
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* 响应式（手机适配） */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                text-align: center;
            }

            .right {
                margin-top: 30px;
            }

            .left h1 {
                font-size: 40px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        
        <!-- 左边 -->
        <div class="left">
            <h1>Discover Anhui</h1>
            <p>welcome to my hometown</p>
            <button class="btn" onclick="explore()">Explore more</button>
        </div>

        <!-- 右边 -->
        <div class="right">
            <img src="https://n.sinaimg.cn/sinakd20122/799/w2048h1151/20230216/7611-94efe79a2f177655d7cb88c673311ac6.jpg">
        </div>

    </div>

    <script>
        function explore() {
            alert("More content coming soon!");
        }
    </script>

</body>
</html>
